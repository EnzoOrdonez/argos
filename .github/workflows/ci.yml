name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install (todos los extras)
        run: pip install -e ".[soar,llm,dev,ui,ml]"
      - name: pytest
        # La suite completa está aislada de infraestructura externa (fakeredis, respx,
        # transportes ASGI): no necesita Redis/Postgres/Wazuh corriendo. testpaths y
        # addopts vienen de pyproject.toml.
        run: pytest

  lint:
    name: lint (ruff + mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install (dev + contracts para mypy)
        run: pip install -e ".[soar,llm,dev,ui,ml]"
      - name: ruff
        run: ruff check .
      - name: mypy (argos_contracts)
        # Adopción incremental de mypy strict: por ahora solo el paquete de contratos
        # (Pydantic puro, pasa strict hoy). Ampliar módulo por módulo en el futuro.
        run: mypy argos_contracts
