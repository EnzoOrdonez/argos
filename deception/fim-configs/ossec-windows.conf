<!--
  deception/fim-configs/ossec-windows.conf

  Bloque <syscheck> para agentes Windows que alojan canary files (Layer 3).
  Usa whodata para capturar el usuario, proceso y PID responsable del
  evento, requisito explícito del manual P3 para que la alerta llegue
  completa a downstream (soar/ Decision Engine).

  Rutas EXACTAS, no wildcards (disciplina de diseño de canaries del README).
  Las rutas deben coincidir 1:1 con deception/canary-generator/config.yaml.

  ⚠️ Este bloque se inserta dentro de la sección <ossec_config> del
  ossec.conf del AGENTE (no del manager). El despliegue real (copiar este
  archivo al host victim-windows-01 y reiniciar el agente) requiere que
  P4 tenga el laboratorio levantado — PENDIENTE DE CONFIRMAR CON P4.
-->
<ossec_config>
  <syscheck>
    <disabled>no</disabled>
    <frequency>43200</frequency>

    <!-- Canary: financials_Q4_2025.xlsx -->
    <directories check_all="yes" whodata="yes" report_changes="yes">
      C:\Users\victim\Documents\financials_Q4_2025.xlsx
    </directories>

    <!-- Canary: passwords.txt -->
    <directories check_all="yes" whodata="yes" report_changes="yes">
      C:\Users\victim\Desktop\passwords.txt
    </directories>

    <!-- Canary: db_backup.sql -->
    <directories check_all="yes" whodata="yes" report_changes="yes">
      C:\Backups\db_backup.sql
    </directories>

    <!-- Canary: accounts_admin.csv -->
    <directories check_all="yes" whodata="yes" report_changes="yes">
      C:\Users\victim\Documents\accounts_admin.csv
    </directories>

    <!-- whodata requiere que el subsistema de auditoría de Windows esté
         habilitado en el host. Verificar con P4 que el agente tenga
         privilegios SACL sobre estas rutas específicas. -->
    <whodata>
      <restart_audit>yes</restart_audit>
    </whodata>
  </syscheck>
</ossec_config>
