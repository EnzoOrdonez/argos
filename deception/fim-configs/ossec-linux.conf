<!--
  deception/fim-configs/ossec-linux.conf

  Bloque <syscheck> para agentes Linux que alojan canary files (Layer 3).
  En Linux, Wazuh usa auditd como fuente para capturar el proceso
  responsable (equivalente a whodata en Windows).

  Rutas EXACTAS, no wildcards. Deben coincidir 1:1 con
  deception/canary-generator/config.yaml.

  ⚠️ Requiere que auditd esté instalado y corriendo en el host
  (apt install auditd / yum install audit) y que el agente Wazuh tenga
  las reglas de auditd correspondientes (ver bloque al final). El
  despliegue real contra el host victim-linux-01 está PENDIENTE DE
  CONFIRMAR CON P4.
-->
<ossec_config>
  <syscheck>
    <disabled>no</disabled>
    <frequency>43200</frequency>

    <!-- Canary: financials_Q4_2025.xlsx -->
    <directories check_all="yes" whodata="yes" report_changes="yes">
      /home/victim/Documents/financials_Q4_2025.xlsx
    </directories>

    <!-- Canary: passwords.txt -->
    <directories check_all="yes" whodata="yes" report_changes="yes">
      /home/victim/passwords.txt
    </directories>

    <!-- Canary: db_backup.sql -->
    <directories check_all="yes" whodata="yes" report_changes="yes">
      /var/backups/db_backup.sql
    </directories>

    <!-- Canary: accounts_admin.csv -->
    <directories check_all="yes" whodata="yes" report_changes="yes">
      /home/victim/Documents/accounts_admin.csv
    </directories>
  </syscheck>
</ossec_config>

<!--
  Reglas auditd equivalentes a agregar en /etc/audit/rules.d/canaries.rules
  del host victim-linux-01 (fuera del control de Wazuh, a nivel de SO):

  -w /home/victim/Documents/financials_Q4_2025.xlsx -p rwxa -k argos_canary
  -w /home/victim/passwords.txt -p rwxa -k argos_canary
  -w /var/backups/db_backup.sql -p rwxa -k argos_canary
  -w /home/victim/Documents/accounts_admin.csv -p rwxa -k argos_canary

  Tras agregarlas: `sudo augenrules --load` o `sudo service auditd restart`
  según la distro del host — confirmar con P4 qué distro corre el lab.
-->
