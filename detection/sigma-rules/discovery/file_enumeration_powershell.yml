title: Discovery - File and Directory Enumeration Pre-Ransomware (PowerShell/Bash)
id: a1b2c3d4-e5f6-7890-abcd-ef1234560007
status: experimental
description: >
  Detecta enumeración masiva de archivos y directorios del sistema, fase de
  reconocimiento previa al cifrado en UC-01, UC-02 y UC-03. Cubre comandos
  find recursivo, búsqueda por extensiones de valor (docs, BD, keys) y
  equivalentes Python (os.walk, glob). Nivel medium → T3 si aparece solo;
  escala a T2 cuando correlaciona con T1486 en el Decision Engine.
  # Validated by: T1083/AtomicTest#1 — File and Directory Discovery (Linux find)
references:
  - https://attack.mitre.org/techniques/T1083/
  - https://github.com/redcanaryco/atomic-red-team/blob/master/atomics/T1083/T1083.md
author: Angeles Castillo — ARGOS Project P3, Universidad de Lima 2026-1
date: 2026-05-24
modified: 2026-05-24
tags:
  - attack.discovery
  - attack.t1083
logsource:
  category: process_creation
  product: linux
detection:
  selection_find_recursive:
    Image|endswith: 'find'
    CommandLine|contains:
      - '-type f'
      - '-R'
    CommandLine|contains:
      - '/home'
      - '/var/lib/postgresql'
      - '/etc'
      - '/root'
      - '/opt'
      - '/var/www'
  selection_extension_targeting:
    Image|endswith: 'find'
    CommandLine|contains:
      - '-name "*.doc'
      - '-name "*.xls'
      - '-name "*.pdf'
      - '-name "*.db'
      - '-name "*.sql'
      - '-name "*.bak'
      - '-name "*.key'
      - '-name "*.pem'
      - '-name "*.csv'
  selection_python_enum:
    Image|endswith:
      - 'python3'
      - 'python'
    CommandLine|contains:
      - 'os.walk'
      - 'glob.glob'
      - 'scandir'
      - 'listdir'
  filter_backup_tools:
    Image|endswith:
      - 'rsync'
      - 'tar'
      - 'bacula'
      - 'duplicati'
  condition: >
    (selection_find_recursive or selection_extension_targeting or selection_python_enum)
    and not filter_backup_tools
falsepositives:
  - Herramientas de backup con escaneo previo
  - Scripts de inventario de activos programados
  - Administradores realizando auditoría manual de archivos
level: medium
# Wazuh level mapping → 8 (MEDIUM → T3; escala a T2 si correlaciona con T1486)
fields:
  - Image
  - CommandLine
  - User
  - WorkingDirectory
  - ParentImage
  - ProcessId