title: Ransomware - Ransom Note File Drop
id: a1b2c3d4-e5f6-7890-abcd-ef1234560002
status: experimental
description: >
  Detecta la creación de archivos típicos de nota de rescate en directorios
  de usuario o raíz. El simulador ARGOS genera una nota tras el cifrado;
  esta regla la detecta por nombre de archivo y contenido típico.
  # Validated by: T1486/AtomicTest#2 — Create ransom note
references:
  - https://attack.mitre.org/techniques/T1486/
  - https://github.com/redcanaryco/atomic-red-team/blob/master/atomics/T1486/T1486.md
author: Angeles Castillo — ARGOS Project P3, Universidad de Lima 2026-1
date: 2026-05-24
modified: 2026-05-24
tags:
  - attack.impact
  - attack.t1486
logsource:
  category: file_event
  product: linux
detection:
  selection_ransom_note_name:
    EventType: CreateFile
    TargetFilename|contains:
      - 'README_DECRYPT'
      - 'HOW_TO_DECRYPT'
      - 'YOUR_FILES_ARE_ENCRYPTED'
      - 'RECOVER_FILES'
      - 'RANSOM_NOTE'
      - 'READ_ME'
      - 'DECRYPT_INSTRUCTIONS'
      - '!!!IMPORTANT!!!'
  selection_ransom_note_extension:
    EventType: CreateFile
    TargetFilename|endswith:
      - '.txt'
      - '.html'
      - '.hta'
    TargetFilename|contains:
      - 'decrypt'
      - 'ransom'
      - 'recover'
      - 'restore'
  condition: selection_ransom_note_name or selection_ransom_note_extension
falsepositives:
  - Archivos README legítimos en directorios de proyectos
level: critical
# Wazuh level mapping → 13 (CRITICAL → T2 Decision Engine)
fields:
  - TargetFilename
  - Image
  - User
  - ProcessId
