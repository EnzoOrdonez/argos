title: Ransomware - High Entropy File Writes (Data Encrypted for Impact)
id: a1b2c3d4-e5f6-7890-abcd-ef1234560001
status: experimental
description: >
  Detecta escritura masiva de archivos con extensiones típicas de ransomware o
  patrones de renombrado secuencial. Cubre cifrado AES desde scripts Python
  (simulador ARGOS) y herramientas genéricas de cifrado de archivos en masa.
  # Validated by: T1486/AtomicTest#1 — Encrypt files using Python AES
references:
  - https://attack.mitre.org/techniques/T1486/
  - https://github.com/redcanaryco/atomic-red-team/blob/master/atomics/T1486/T1486.md
author: Angeles Castillo — ARGOS Project P3, Universidad de Lima 2026-1
date: 2026-05-24
modified: 2026-05-24
tags:
  - attack.impact
  - attack.t1486
logsource:
  category: file_event
  product: linux
detection:
  selection_encrypted_extension:
    EventType:
      - RenameFile
      - CreateFile
    TargetFilename|endswith:
      - '.encrypted'
      - '.locked'
      - '.enc'
      - '.crypto'
      - '.rnsmwr'
      - '.wncry'
      - '.zepto'
      - '.cerber'
      - '.argos_test'
  selection_python_aes:
    Image|endswith:
      - 'python3'
      - 'python'
    CommandLine|contains:
      - 'AES'
      - 'Fernet'
      - 'encrypt'
      - 'cipher'
      - 'cryptography'
  condition: selection_encrypted_extension or selection_python_aes
falsepositives:
  - Herramientas legítimas de backup con cifrado (verificar proceso padre)
  - Scripts de compresión con extensiones personalizadas
level: critical
# Wazuh level mapping → 13 (CRITICAL → T2 Decision Engine)
fields:
  - Image
  - CommandLine
  - TargetFilename
  - User
  - ProcessId
  - ParentImage
