title: C2 Beacon - Application Layer Protocol (Post-Encryption Callback)
id: a1b2c3d4-e5f6-7890-abcd-ef1234560005
status: experimental
description: >
  Detecta comunicaciones C2 periódicas sobre HTTP/S o DNS tras cifrado de archivos.
  El simulador ARGOS genera un beacon C2 después del cifrado; esta regla detecta
  ese patrón: conexión saliente repetida con intervalo fijo (sleep loop) desde
  un proceso sospechoso.
  # Validated by: T1071/AtomicTest#1 — C2 via HTTP POST
references:
  - https://attack.mitre.org/techniques/T1071/
  - https://attack.mitre.org/techniques/T1071/001/
  - https://github.com/redcanaryco/atomic-red-team/blob/master/atomics/T1071/T1071.md
author: Angeles Castillo — ARGOS Project P3, Universidad de Lima 2026-1
date: 2026-05-24
modified: 2026-05-24
tags:
  - attack.command_and_control
  - attack.t1071
  - attack.t1071.001
logsource:
  category: network_connection
  product: linux
detection:
  selection_beacon_loop:
    Image|endswith:
      - 'python3'
      - 'python'
      - 'bash'
      - 'sh'
    CommandLine|contains:
      - 'while True'
      - 'while true'
      - 'time.sleep'
      - 'sleep'
    DestinationPort:
      - 80
      - 443
      - 4444
      - 8080
      - 1337
      - 31337
    Initiated: 'true'
  selection_known_c2_tools:
    CommandLine|contains:
      - 'requests.post'
      - 'beacon'
      - 'implant'
      - 'c2_url'
      - 'callback_url'
  selection_dns_tunnel:
    Image|endswith:
      - 'dig'
      - 'nslookup'
      - 'python3'
    CommandLine|contains:
      - 'TXT'
      - 'base64'
    DestinationPort: 53
  filter_legitimate:
    DestinationHostname|endswith:
      - 'ubuntu.com'
      - 'debian.org'
      - 'python.org'
      - 'github.com'
      - 'pypi.org'
  condition: >
    (selection_beacon_loop or selection_known_c2_tools or selection_dns_tunnel)
    and not filter_legitimate
falsepositives:
  - Aplicaciones con heartbeat legítimo hacia servicios SaaS
  - Scripts de monitoreo con ping periódico
  - Actualizaciones automáticas de paquetes
level: critical
# Wazuh level mapping → 14 (CRITICAL → T2 Decision Engine, máxima prioridad)
fields:
  - Image
  - CommandLine
  - DestinationIp
  - DestinationPort
  - DestinationHostname
  - User
  - ProcessId
