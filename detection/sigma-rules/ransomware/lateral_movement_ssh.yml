title: Lateral Movement - Remote Services Abuse via SSH/RDP (UC-04)
id: a1b2c3d4-e5f6-7890-abcd-ef1234560008
status: experimental
description: >
  Detecta uso sospechoso de servicios remotos (SSH, RDP) para movimiento lateral
  en UC-04. Cubre conexiones SSH con flags de bypass de verificación de host,
  herramientas de fuerza bruta SSH y uso de librerías como paramiko en contexto
  de ransomware propagándose por la red interna.
  # Validated by: T1021/AtomicTest#1 — SSH Lateral Movement
references:
  - https://attack.mitre.org/techniques/T1021/
  - https://github.com/redcanaryco/atomic-red-team/blob/master/atomics/T1021/T1021.md
author: Angeles Castillo — ARGOS Project P3, Universidad de Lima 2026-1
date: 2026-05-24
modified: 2026-05-24
tags:
  - attack.lateral_movement
  - attack.t1021
logsource:
  category: process_creation
  product: linux
detection:
  selection_ssh_no_verify:
    Image|endswith:
      - 'ssh'
      - 'scp'
      - 'sftp'
    CommandLine|contains:
      - 'StrictHostKeyChecking=no'
      - 'UserKnownHostsFile=/dev/null'
      - 'BatchMode=yes'
  selection_mass_ssh_scripted:
    Image|endswith:
      - 'bash'
      - 'sh'
      - 'python3'
    CommandLine|contains:
      - 'paramiko'
      - 'fabric'
      - 'for.*ssh'
      - 'while.*ssh'
  selection_ssh_keyscan:
    Image|endswith: 'ssh-keyscan'
    CommandLine|contains:
      - '-t rsa'
      - '-H'
  filter_ci_cd:
    User:
      - 'gitlab-runner'
      - 'jenkins'
      - 'deploy'
      - 'ansible'
  condition: >
    (selection_ssh_no_verify or selection_mass_ssh_scripted or selection_ssh_keyscan)
    and not filter_ci_cd
falsepositives:
  - Pipelines CI/CD con despliegue automatizado vía SSH
  - Herramientas de orquestación (Ansible, Fabric) en entornos conocidos
  - Administradores con acceso legítimo multi-host documentado
level: high
# Wazuh level mapping → 10 (HIGH → T2 Decision Engine)
fields:
  - Image
  - CommandLine
  - User
  - DestinationHostname
  - DestinationIp
  - ParentImage
  - ProcessId
