<!--
  ARGOS active-response: registro de los comandos. En ARGOS la contencion la
  dispara el SOAR via PUT /active-response (NO por rule-match), asi que estos
  bloques solo REGISTRAN el comando como disponible en el manager. location=local
  ejecuta el script en el agente objetivo (el que pasa el SOAR en agents_list).

  Los reverts (argos-unisolate, argos-unthrottle) quedan definidos como <command>
  y los invoca el SOAR por nombre; no necesitan un <active-response> de auto-trigger.
-->
<ossec_config>
  <active-response>
    <command>argos-isolate</command>
    <location>local</location>
  </active-response>

  <active-response>
    <command>argos-throttle</command>
    <location>local</location>
  </active-response>

  <active-response>
    <command>argos-snapshot</command>
    <location>local</location>
  </active-response>

  <active-response>
    <command>argos-kill</command>
    <location>local</location>
  </active-response>

  <active-response>
    <command>argos-block-ip</command>
    <location>local</location>
  </active-response>
</ossec_config>
