<!--
  ARGOS active-response: definicion de comandos. Va en el ossec.conf del Wazuh
  manager (o como fragmento incluido). El <executable> debe existir en
  /var/ossec/active-response/bin/ de CADA agente, con el script OS-correcto bajo
  ese nombre (Linux: el .sh; Windows: el .ps1 via wrapper .cmd, ver README).

  Los <name> coinciden 1:1 con DEFAULT_RUN_COMMANDS y DEFAULT_REVERT_COMMANDS de
  soar/playbooks/wazuh.py: el WazuhActiveResponseExecutor los invoca por nombre via
  PUT /active-response. Un test (active-response/tests) verifica esa coincidencia.
-->
<ossec_config>
  <command>
    <name>argos-isolate</name>
    <executable>argos-isolate</executable>
    <timeout_allowed>yes</timeout_allowed>
  </command>

  <command>
    <name>argos-unisolate</name>
    <executable>argos-unisolate</executable>
    <timeout_allowed>no</timeout_allowed>
  </command>

  <command>
    <name>argos-throttle</name>
    <executable>argos-throttle</executable>
    <timeout_allowed>yes</timeout_allowed>
  </command>

  <command>
    <name>argos-unthrottle</name>
    <executable>argos-unthrottle</executable>
    <timeout_allowed>no</timeout_allowed>
  </command>

  <command>
    <name>argos-snapshot</name>
    <executable>argos-snapshot</executable>
    <timeout_allowed>no</timeout_allowed>
  </command>

  <command>
    <name>argos-kill</name>
    <executable>argos-kill</executable>
    <timeout_allowed>no</timeout_allowed>
  </command>
</ossec_config>
