# ARGOS — docker-compose Perfil A (ADR-0015 §2.4 enmendado: manager-only, sin OpenSearch).
# Servicios core de ARGOS en la VM Linux core. Las víctimas (Windows endpoint + Linux
# Debian/PostgreSQL app_prod) son VMs EXTERNAS, NO servicios de este compose.
# Wazuh manager: instalado en la VM core (systemd), NO acá; el bridge montea su alerts.json.
# El postgres de acá es para argos_audit (el log de ARGOS), separado del app_prod de la víctima.
#
#   docker compose up -d                     # core simulado: redis, postgres, soar, console, llm-triage
#   docker compose --profile real up -d      # + bridge (camino real; requiere Wazuh en la VM core)
#   docker compose --profile fallback up -d  # + streamlit (consola de respaldo)
#
# Secretos: .env (gitignored). Nada hardcodeado acá. Default ARGOS_EXECUTOR=simulated.

x-argos-image: &argos-image
  image: argos-core:latest
  build:
    context: .
    dockerfile: Dockerfile

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:17.5-bookworm
    restart: unless-stopped
    environment:
      # C11 (2026-06-29): DB/USER fijados literales para que el audit-DB NUNCA herede
      # los POSTGRES_* del .env (que antes traian valores de la VM victima). Ver .env.
      POSTGRES_DB: argos_audit
      POSTGRES_USER: argos
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    ports: ["5432:5432"]
    volumes:
      - argos-pgdata:/var/lib/postgresql/data
      - ./soar/audit/schema.sql:/docker-entrypoint-initdb.d/01-argos-audit.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U argos -d argos_audit"]
      interval: 5s
      timeout: 3s
      retries: 5

  soar:
    <<: *argos-image
    command: uvicorn soar.approval_api.main:app --host 0.0.0.0 --port 8003
    restart: unless-stopped
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
      ARGOS_EXECUTOR: ${ARGOS_EXECUTOR:-simulated}
    ports: ["8003:8003"]
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8003/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Daemon consumer: drena events:normalized (bridge -> Redis) y corre el tier router +
  # respuesta. Sin este proceso, el bridge publica pero NADIE consume (blocker Fase 0).
  # ARGOS_REQUIRE_APPROVAL=true por defecto: ninguna contención se auto-ejecuta sin humano.
  soar-consumer:
    <<: *argos-image
    command: python -m soar.decision_engine
    restart: unless-stopped
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
      ARGOS_EXECUTOR: ${ARGOS_EXECUTOR:-simulated}
      ARGOS_AUDIT_SQL_DSN: postgresql://${POSTGRES_USER:-argos}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@postgres:5432/${POSTGRES_DB:-argos_audit}
      ARGOS_REQUIRE_APPROVAL: ${ARGOS_REQUIRE_APPROVAL:-true}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  console:
    <<: *argos-image
    command: uvicorn console.api.main:app --host 0.0.0.0 --port 8080
    restart: unless-stopped
    # env_file para CONSOLE_BASIC_USER/PASS (auth de la consola, RF-7). Sin esas dos
    # variables la consola corre sin auth; con ellas gatea `/` y `/api/*`.
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
      # Habilita el card de timeline (lee argos_audit). Sin esto la consola sigue OK, solo Redis.
      ARGOS_AUDIT_SQL_DSN: postgresql://${POSTGRES_USER:-argos}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@postgres:5432/${POSTGRES_DB:-argos_audit}
    ports: ["8080:8080"]
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy   # el reader del timeline conecta lazy 1 vez; postgres debe estar listo
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 5

  llm-triage:
    <<: *argos-image
    command: uvicorn llm_triage.api.main:app --host 0.0.0.0 --port 8002
    restart: unless-stopped
    env_file: .env
    environment:
      LLM_BACKEND: ${LLM_BACKEND:-openai}
    # Cache LLM a prueba de camara (DEMO_MODE): el host genera demo/cached-responses/
    # (scripts/gen_llm_cache.py) y se monta read-only. Con DEMO_MODE=true en .env el
    # servicio sirve desde aca (DEMO_CACHE_PATH=./demo/cached-responses -> /app/demo/...).
    volumes:
      - ./demo:/app/demo:ro
    ports: ["8002:8002"]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8002/health"]
      interval: 10s
      timeout: 3s
      retries: 5

  # --- Wazuh manager (manager-only, Perfil A: sin indexer/dashboard). Solo `--profile real`.
  #     Produce alerts.json en el volumen compartido `wazuh-alerts` que el bridge tail-ea.
  #     Enrola agentes por 1514/1515; expone la API (55000) para el active-response real del
  #     SOAR (WazuhActiveResponseExecutor -> PUT /active-response). El registro de comandos AR
  #     en ossec.conf + el deploy de los AR bin al agente se hacen en la validación real
  #     (ver docs/INSTALL_SSH_VECTOR.md); la regla SSH de Fase 1 ya va montada acá. ---
  wazuh-manager:
    image: wazuh/wazuh-manager:4.9.2
    profiles: ["real"]
    restart: unless-stopped
    hostname: wazuh-manager
    ports:
      - "1514:1514"    # comunicación de agentes
      - "1515:1515"    # enrolamiento (authd)
      - "55000:55000"  # API del manager (la usa el executor real del SOAR)
    volumes:
      - wazuh-alerts:/var/ossec/logs/alerts   # compartido con el bridge (lee :ro)
      # Regla SSH brute-force de Fase 1 (T1110) como local rules del manager.
      - ./detection/wazuh-rules/ssh_bruteforce_rules.xml:/var/ossec/etc/rules/local_rules.xml:ro
    ulimits:
      memlock:
        soft: -1
        hard: -1

  # --- Camino real: solo con `--profile real`. Lee el alerts.json que produce
  #     el wazuh-manager (volumen compartido `wazuh-alerts`). ---
  bridge:
    <<: *argos-image
    profiles: ["real"]
    command: python -m bridge --alerts-path /var/ossec/logs/alerts/alerts.json --redis-url redis://redis:6379/0
    restart: unless-stopped
    volumes:
      - wazuh-alerts:/var/ossec/logs/alerts:ro   # alerts.json del wazuh-manager (volumen compartido)
    depends_on:
      redis:
        condition: service_healthy
      wazuh-manager:
        condition: service_started

  # --- Consola de respaldo (Streamlit): solo con `--profile fallback`. ---
  streamlit:
    <<: *argos-image
    profiles: ["fallback"]
    command: streamlit run ui/streamlit_app/app.py --server.port 8501 --server.address 0.0.0.0
    restart: unless-stopped
    environment:
      REDIS_URL: redis://redis:6379/0
    ports: ["8501:8501"]
    depends_on:
      redis:
        condition: service_healthy

volumes:
  argos-pgdata:
  wazuh-alerts:   # alerts.json compartido wazuh-manager -> bridge (profile real)
